<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELEACH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: pointer; }
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            background: #000;
        }
        .hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 18px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 10;
        }
        .hint.show { opacity: 1; }
    </style>
</head>
<body>
    <video id="player" src="TIMELEACH-RE-MIX_Media_u-yzMUpvZYQ_001_1080p.mp4" autoplay loop playsinline preload="auto"></video>
    <div class="hint" id="hint">Click anywhere for sound &amp; fullscreen</div>

    <script>
        const v = document.getElementById('player')
        const hint = document.getElementById('hint')

        // Try to start with sound immediately.
        v.muted = false
        v.volume = 1
        const firstAttempt = v.play()

        const needsGesture = () => {
            // Browser blocked unmuted autoplay — fall back to muted playback
            // and wait for the user's first interaction to unmute + fullscreen.
            v.muted = true
            v.play().catch(() => {})
            hint.classList.add('show')
        }

        if (firstAttempt && typeof firstAttempt.catch === 'function') {
            firstAttempt.catch(needsGesture)
        }

        // On first interaction: unmute, enter browser fullscreen, hide hint.
        const activate = () => {
            v.muted = false
            v.volume = 1
            v.play().catch(() => {})

            const el = document.documentElement
            const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen
            if (req) req.call(el).catch(() => {})

            hint.classList.remove('show')
            document.removeEventListener('click', activate)
            document.removeEventListener('keydown', activate)
            document.removeEventListener('touchstart', activate)
        }
        document.addEventListener('click', activate)
        document.addEventListener('keydown', activate)
        document.addEventListener('touchstart', activate)
    </script>
</body>
</html>
