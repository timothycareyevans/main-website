  <rect x="9" y="7" width="451" height="133" fill="#bfbfbf"/>
  <rect x="9" y="7" width="451" height="6" fill="#f3f3f3"/>
  <rect x="9" y="7" width="6" height="133" fill="#f3f3f3"/>
