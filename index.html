<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Timothy Carey Evans</title>
    </head>
    <body>
        <section class="showcase">
            <header>
                <h2 class="logo">Timothy Carey Evans</h2>
                <div class="toggle">
                    <div class="toggle-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </header>

            <video class="video-desktop" src="Planet_2880x1220_HPA.mp4" width="100" autoplay loop muted playsinline></video>
            <video class="video-tablet" src="error.mp4" autoplay loop muted playsinline></video>
            <video class="video-mobile" src="bay_bridge_timelapse.mp4" autoplay loop muted playsinline></video>
            
            <div class="overlay"></div>

            <div class="text">
                <h3>Hack the Planet</h3>
                <h4>San Francisco, CA</h4>
                <a href="https://www.timothycareyevans.com/startyourday/index.html">Start Your Day</a>
            </div>
        </section>

        <div class="menu">
            <ul>
                <li><a href="https://www.timothycareyevans.com/cybersecurity/index.html">Cybersecurity</a></li>
                <li><a href="https://www.timothycareyevans.com/artificialintelligence/index.html">Artifical Intelligence</a></li>
                <br>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Tasks</a></li>
                <br>
                <li><a href="#">Notes</a></li>
                <li><a href="#">Bookmarks</a></li>
                <li><a href="#">Resources</a></li>
                <br>
                <li><a href="https://www.timothycareyevans.com/timeleach/">TIMELEACH</a></li>
                <br>
                <li><a href="https://www.github.com/timothycareyevans">Github</a></li>
                <li><a href="https://www.linkedin.com/in/timothy-e-a3b8324">Linkedin</a></li>
                <li><a href="#">Resume</a></li>
                <li><a href="#">Contact Me</a></li>
            </ul>
        </div>

        <script>
            const menuToggle = document.querySelector('.toggle')
            const showcase = document.querySelector('.showcase')

            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active')
                showcase.classList.toggle('active')
            })

            const stopVideo = (selector) => {
                const v = document.querySelector(selector)
                v.pause()
                v.removeAttribute('src')
                v.load()
            }

            const playVideo = (selector) => {
                const v = document.querySelector(selector)
                v.muted = true
                v.playsInline = true
                const attempt = () => {
                    const p = v.play()
                    if (p && typeof p.catch === 'function') {
                        p.catch(() => {
                            // Retry once after a short delay for stricter autoplay policies
                            setTimeout(() => v.play().catch(() => {}), 300)
                        })
                    }
                }
                if (v.readyState >= 2) attempt()
                else v.addEventListener('loadeddata', attempt, { once: true })
            }

            const getBreakpoint = (width) => {
                if (width <= 768) return 'mobile'
                if (width <= 1024) return 'tablet'
                return 'desktop'
            }

            let currentBreakpoint = getBreakpoint(window.innerWidth)

            if (currentBreakpoint === 'mobile') {
                stopVideo('.video-desktop')
                stopVideo('.video-tablet')
                playVideo('.video-mobile')
            } else if (currentBreakpoint === 'tablet') {
                stopVideo('.video-desktop')
                stopVideo('.video-mobile')
                playVideo('.video-tablet')
            } else {
                stopVideo('.video-tablet')
                stopVideo('.video-mobile')
                playVideo('.video-desktop')
            }

            let resizeTimer
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer)
                resizeTimer = setTimeout(() => {
                    const newBreakpoint = getBreakpoint(window.innerWidth)
                    if (newBreakpoint !== currentBreakpoint) {
                        location.reload()
                    }
                }, 250)
            })
        </script>
    </body>
</html>
